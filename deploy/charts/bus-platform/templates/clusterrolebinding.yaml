{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bus-platform-control
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ if .Values.rbac.clusterAdminBinding }}cluster-admin{{ else }}bus-platform-control{{ end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "bus-platform.serviceAccountName" . }}
    namespace: {{ include "bus-platform.namespace" . }}
{{- end }}
