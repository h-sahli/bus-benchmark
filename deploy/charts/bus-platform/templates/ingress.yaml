{{- if .Values.ingress.enabled }}
{{- $hostMode := include "bus-platform.ingressHostMode" . -}}
{{- $host := include "bus-platform.ingressHost" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bus-platform
  namespace: {{ include "bus-platform.namespace" . }}
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{ if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{ end }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.secretName (eq (include "bus-platform.ingressHasFinalHost" .) "true") }}
  tls:
    - {{- if $host }}
      hosts:
        - {{ $host | quote }}
      {{- end }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    {{ if ne $hostMode "hostless" }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType | quote }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
    {{ else }}
    - http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType | quote }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
    {{ end }}
{{- end }}
