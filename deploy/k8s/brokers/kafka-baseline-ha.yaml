apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-baseline-controllers
  namespace: bench-kafka
  labels:
    strimzi.io/cluster: kafka-baseline
    benchmark.ninefinger9.io/broker: kafka
    benchmark.ninefinger9.io/mode: baseline
    benchmark.ninefinger9.io/deployment-mode: ha
    benchmark.ninefinger9.io/node-role: controller
spec:
  replicas: 3
  roles:
    - controller
  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: 1Gi
  storage:
    type: persistent-claim
    size: 5Gi
    deleteClaim: true
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-baseline-brokers
  namespace: bench-kafka
  labels:
    strimzi.io/cluster: kafka-baseline
    benchmark.ninefinger9.io/broker: kafka
    benchmark.ninefinger9.io/mode: baseline
    benchmark.ninefinger9.io/deployment-mode: ha
    benchmark.ninefinger9.io/node-role: broker
spec:
  replicas: 3
  roles:
    - broker
  resources:
    requests:
      cpu: "1500m"
      memory: 3Gi
    limits:
      cpu: "1500m"
      memory: 3Gi
  storage:
    type: persistent-claim
    size: 20Gi
    deleteClaim: true
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-baseline
  namespace: bench-kafka
  labels:
    benchmark.ninefinger9.io/broker: kafka
    benchmark.ninefinger9.io/mode: baseline
    benchmark.ninefinger9.io/deployment-mode: ha
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      auto.create.topics.enable: "false"
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
