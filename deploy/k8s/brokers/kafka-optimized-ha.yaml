apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-optimized-controllers
  namespace: bench-kafka
  labels:
    strimzi.io/cluster: kafka-optimized
    benchmark.ninefinger9.io/broker: kafka
    benchmark.ninefinger9.io/mode: optimized
    benchmark.ninefinger9.io/deployment-mode: ha
    benchmark.ninefinger9.io/node-role: controller
spec:
  replicas: 3
  roles:
    - controller
  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: 1Gi
  storage:
    type: persistent-claim
    size: 5Gi
    deleteClaim: true
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-optimized-brokers
  namespace: bench-kafka
  labels:
    strimzi.io/cluster: kafka-optimized
    benchmark.ninefinger9.io/broker: kafka
    benchmark.ninefinger9.io/mode: optimized
    benchmark.ninefinger9.io/deployment-mode: ha
    benchmark.ninefinger9.io/node-role: broker
spec:
  replicas: 3
  roles:
    - broker
  resources:
    requests:
      cpu: "2500m"
      memory: 4Gi
    limits:
      cpu: "2500m"
      memory: 4Gi
  storage:
    type: persistent-claim
    size: 24Gi
    deleteClaim: true
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-optimized
  namespace: bench-kafka
  labels:
    benchmark.ninefinger9.io/broker: kafka
    benchmark.ninefinger9.io/mode: optimized
    benchmark.ninefinger9.io/deployment-mode: ha
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      auto.create.topics.enable: "false"
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      queued.max.requests: 1000
      num.network.threads: 8
      num.io.threads: 16
      num.replica.fetchers: 4
      socket.send.buffer.bytes: 1048576
      socket.receive.buffer.bytes: 1048576
      socket.request.max.bytes: 104857600
      message.max.bytes: 10485760
      replica.fetch.max.bytes: 10485760
      log.segment.bytes: 268435456
  entityOperator:
    topicOperator: {}
    userOperator: {}
